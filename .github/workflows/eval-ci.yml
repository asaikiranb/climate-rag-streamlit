name: RAG Eval Pipeline

on:
  push:
    branches-ignore:
      - main

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- System deps (Tesseract OCR + Ollama) ----
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:1.5b
          # Stop Ollama to free RAM for bge-m3 embedding model loading (~2.3GB).
          # The Ollama judge module will restart it lazily when needed for generation scoring.
          pkill ollama || true
          sleep 2
          echo "Ollama installed, model cached, server stopped to save RAM"

      # ---- Python ----
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ---- Run Eval ----
      # Answer generation : Groq API (GROQ_API_KEY) — llama-3.3-70b-versatile
      # Reranker          : HF Inference API (HF_TOKEN) — ctxl-rerank-v2
      # LLM Judge         : Local Ollama (qwen2.5:3b) — no API key needed
      - name: Run comprehensive evaluation
        env:
          CHROMA_COLLECTION_NAME: hvac_documents
          TOKENIZERS_PARALLELISM: "false"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OLLAMA_JUDGE_MODEL: qwen2.5:1.5b
          OLLAMA_MODEL: qwen2.5:1.5b
          # GROQ_API_KEY intentionally omitted — using Ollama for everything
          # CONTEXTUAL_API_KEY intentionally omitted — using Ollama judge instead
        run: |
          python run_contextual_eval.py \
            --retrieval-only \
            --output eval_results_comprehensive.json \
            2>&1 | tee eval_output.log
          echo "Eval complete"

      # ---- Upload artifacts ----
      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.ref_name }}
          path: |
            eval_results_comprehensive.json
            eval_output.log
          retention-days: 30

      # ---- Format + Send Email ----
      - name: Format email report
        if: always() && hashFiles('eval_results_comprehensive.json') != ''
        run: |
          python format_email.py \
            --input eval_results_comprehensive.json \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            > email_body.html

      - name: Send email to collaborators
        if: always() && hashFiles('email_body.html') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "RAG Eval Results — ${{ github.ref_name }} @ ${{ github.sha }}"
          to: asaikiranb@gmail.com, balaji24@uw.edu, mithul24@uw.edu, rohith02@uw.edu, sagorika@uw.edu, annangi@uw.edu
          from: "RAG Eval Bot <${{ secrets.SMTP_USERNAME }}>"
          html_body: file://email_body.html
          attachments: eval_results_comprehensive.json
