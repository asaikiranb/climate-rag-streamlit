name: RAG Eval Pipeline

on:
  push:
    branches-ignore:
      - main

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Sanitize branch name ----
      - name: Set safe branch name
        run: echo "SAFE_BRANCH=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      # ---- System deps (Tesseract OCR + Ollama) ----
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      # ---- Python ----
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ---- Run Eval (primary contract: doc/page v2) ----
      - name: Run upgraded retrieval evaluation
        env:
          EVAL_PRIMARY_CONTRACT: doc_page_v2
          EVAL_EMAIL_COMPAT_MODE: "true"
          MODEL_DEVICE: cpu
          TOKENIZERS_PARALLELISM: "false"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DENSE_FUSION_WEIGHT: "0.66"
          SPARSE_FUSION_WEIGHT: "0.24"
          METADATA_PRIOR_WEIGHT: "0.10"
          EARLY_PAGE_PRIOR: "0.05"
          DOC_FIRST_RERANK_ENABLED: "false"
        run: |
          python -m eval.run \
            --input eval/golden.csv \
            --out eval_out/ci_primary \
            --top-k 10 \
            --anchor-threshold 80 \
            --profile upgraded \
            --backend qdrant \
            --embedding-model BAAI/bge-m3 \
            --sparse-mode bm42 \
            --candidate-k 20 \
            --stage1-pool-size 80 \
            --disable-stage2 \
            --qdrant-path ./qdrant_db_ci \
            --qdrant-collection hvac_documents_qdrant_ci \
            2>&1 | tee eval_output.log
          cp eval_out/ci_primary/eval_results_comprehensive.json eval_results_comprehensive.json
          cp eval_out/ci_primary/eval_manifest.json eval_manifest.json
          cp eval_out/ci_primary/summary.json summary.json
          cp eval_out/ci_primary/per_query.jsonl per_query.jsonl
          echo "Eval complete"

      # ---- Upload artifacts ----
      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ env.SAFE_BRANCH }}
          path: |
            eval_results_comprehensive.json
            eval_manifest.json
            summary.json
            per_query.jsonl
            eval_output.log
          retention-days: 30

      # ---- Format + Send Email ----
      - name: Format email report
        id: format_email
        if: ${{ false }}
        run: |
          python format_email.py \
            --input eval_results_comprehensive.json \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            > email_body.html

      - name: Send email to collaborators
        if: ${{ false }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "RAG Eval Results — ${{ env.SAFE_BRANCH }} @ ${{ github.sha }}"
          to: asaikiranb@gmail.com, balaji24@uw.edu, mithul24@uw.edu, rohith02@uw.edu, sagorika@uw.edu, annangi@uw.edu
          from: "RAG Eval Bot <${{ secrets.SMTP_USERNAME }}>"
          html_body: file://email_body.html
          attachments: eval_results_comprehensive.json
